<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batman ❤️ WonderWoman</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
text-align:center;
overflow-x:hidden;
}

/* BUTTON */
button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
margin-top:10px;
}

/* TITLE */
h1{
text-shadow:0 0 10px #ff4d6d;
}

/* SLIDER */
#slider img{
width:260px;
border-radius:20px;
margin-top:20px;
}

/* HEARTS */
.heart{
position:fixed;
bottom:0;
animation:up 5s linear infinite;
font-size:20px;
}
@keyframes up{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<h1>Batman 🖤 ❤️ WonderWoman 💖</h1>

<p>10 September 2018 se hamari story start ❤️</p>

<!-- MUSIC -->
<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">🎵 Play Music</button>

<!-- PHOTOS -->
<div id="slider">
<img id="img" src="photo1.jpg">
</div>

<!-- MESSAGE -->
<button onclick="showMsg()">💌 Click for Surprise</button>

<p id="msg" style="display:none;">
Bhavna ❤️ (My WonderWoman)  
Tu meri life ka sabse special part hai 💕  
Main hamesha tera rahunga — Batman 🖤  
</p>

<script>

// 🎵 MUSIC
function playMusic(){
document.getElementById("music").play();
}

// 📸 SLIDE
let i=1;
setInterval(()=>{
i++;
if(i>8)i=1;
document.getElementById("img").src="photo"+i+".jpg";
},2000);

// 💌 MESSAGE
function showMsg(){
document.getElementById("msg").style.display="block";
}

// ❤️ HEARTS
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"%";
h.innerHTML="❤️";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
